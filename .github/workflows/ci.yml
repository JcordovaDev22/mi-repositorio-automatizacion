name: CI Pipeline

# Controla cuándo se ejecutará el flujo de trabajo
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Define los trabajos (jobs) que se ejecutarán en paralelo o secuencia
jobs:
  build-and-test:
    # El tipo de máquina virtual en la que se ejecutará el trabajo
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio en la máquina virtual
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configura el entorno de Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # Utiliza la última versión estable de Python 3

    # 3. Instala las dependencias del proyecto (si existen)
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Ejecuta pruebas lógicas o de sintaxis (Linter)
    - name: Validar sintaxis y ejecutar pruebas
      run: |
        # Aquí puedes agregar comandos como 'pytest' o 'python -m unittest' si tienes pruebas creadas
        python -m compileall .